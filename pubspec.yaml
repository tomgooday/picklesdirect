name: pickles_direct
description: "Pickles Direct - Vendor asset submission application. Upload. Offload."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────────
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # ── Dependency Injection ──────────────────────────────────────────────────────
  get_it: ^8.0.3
  injectable: ^2.5.0

  # ── Navigation ────────────────────────────────────────────────────────────────
  go_router: ^15.1.2

  # ── Networking ────────────────────────────────────────────────────────────────
  dio: ^5.8.0+1
  # retrofit added per feature once Pickles middleware OpenAPI specs are available.
  pretty_dio_logger: ^1.4.0

  # ── Local Database (Drift / SQLite) ───────────────────────────────────────────
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1

  # ── Secure Storage & Encryption ───────────────────────────────────────────────
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # ── Authentication (Azure Entra External ID / MSAL) ───────────────────────────
  msal_auth: ^3.3.0

  # ── Background Sync ───────────────────────────────────────────────────────────
  workmanager: ^0.5.2
  connectivity_plus: ^6.1.4

  # ── Camera & Photo ────────────────────────────────────────────────────────────
  camera: ^0.11.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  image: ^4.5.4

  # ── Barcode / VIN Scanning ────────────────────────────────────────────────────
  mobile_scanner: ^7.0.1

  # ── Location / GPS ────────────────────────────────────────────────────────────
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ── Push Notifications ────────────────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.3
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # ── Serialisation & Code Generation ──────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── UI & Design System ────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  permission_handler: ^11.4.0
  app_settings: ^5.1.1

  # ── Forms & Validation ────────────────────────────────────────────────────────
  reactive_forms: ^18.1.0
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.1.2

  # ── Feature Flags (custom lightweight implementation — no external dependency) ─

  # ── Utilities ─────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.5.0
  package_info_plus: ^8.3.0
  device_info_plus: ^11.4.0
  share_plus: ^11.0.0
  url_launcher: ^6.3.1
  timezone: ^0.10.1
  rxdart: ^0.28.0
  collection: ^1.19.1
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ───────────────────────────────────────────────────────────
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  drift_dev: ^2.24.0
  # retrofit_generator: added with retrofit when middleware specs are available.

  # ── Testing ───────────────────────────────────────────────────────────────────
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  integration_test:
    sdk: flutter
  network_image_mock: ^2.1.1

  # ── Linting ───────────────────────────────────────────────────────────────────
  flutter_lints: ^5.0.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/schemas/
    - assets/fonts/

  # fonts: Font files to be supplied by Pickles UX team.
  # Drop .ttf files into assets/fonts/ and uncomment:
  # fonts:
  #   - family: PicklesDisplay
  #     fonts:
  #       - asset: assets/fonts/PicklesDisplay-Regular.ttf
  #       - asset: assets/fonts/PicklesDisplay-Bold.ttf
  #         weight: 700
  #   - family: PicklesBody
  #     fonts:
  #       - asset: assets/fonts/PicklesBody-Regular.ttf
  #       - asset: assets/fonts/PicklesBody-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/PicklesBody-SemiBold.ttf
  #         weight: 600

name: CI

on:
  push:
    branches: [main, develop, "feature/**", "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.5"

jobs:
  # ── Quality Gate ────────────────────────────────────────────────────────────
  quality:
    name: Analyse & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyse
        run: flutter analyze --fatal-infos

  # ── Unit & Widget Tests ─────────────────────────────────────────────────────
  test:
    name: Tests (unit + widget)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage --coverage-path=coverage/lcov.info

      - name: Check coverage threshold (80%)
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 80
          exclude: |
            **/*.g.dart
            **/*.freezed.dart
            **/*.config.dart
            **/firebase_options.dart

      - name: Upload coverage to SonarQube
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  # ── SAST ─────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: dart

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── Android Build ────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Build Android AAB
        run: |
          flutter build appbundle \
            --dart-define=APP_ENV=staging \
            --dart-define=MIDDLEWARE_BASE_URL=${{ secrets.MIDDLEWARE_BASE_URL_STAGING }} \
            --dart-define=AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }} \
            --dart-define=AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 14

  # ── iOS Build ─────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Build iOS (no-codesign)
        run: flutter build ios --no-codesign --release

  # ── Web / PWA Build ──────────────────────────────────────────────────────────
  build-web:
    name: Build Web / PWA
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Build web
        run: flutter build web --pwa-strategy=offline-first --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 14

  # ── Vercel Deployment (Web / PWA) ────────────────────────────────────────────
  deploy-web:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Build web
        run: flutter build web --pwa-strategy=offline-first --release

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (preview on develop, production on main)
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel --yes --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── SBOM Generation ──────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get

      - name: Generate CycloneDX SBOM
        run: |
          dart pub global activate cyclonedx_dart
          dart pub global run cyclonedx_dart:main \
            --output pickles_direct_sbom.json \
            --format json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: pickles_direct_sbom.json
